        /* HAMBURGER (checkbox hack) */
        .hamburger {
            display: none;
            position: relative;
            width: 36px;
            height: 28px;
            cursor: pointer;
        }

        .hamburger input {
            display: block;
            width: 100%;
            height: 100%;
            opacity: 0;
            position: absolute;
            z-index: 2;
            cursor: pointer;
        }

        .hamburger .line {
            display: block;
            width: 100%;
            height: 4px;
            background: #ff3b00;
            position: absolute;
            left: 0;
            border-radius: 0;
            transition: 0.2s;
        }

        .hamburger .line:nth-child(2) { top: 0; }
        .hamburger .line:nth-child(3) { top: 12px; }
        .hamburger .line:nth-child(4) { top: 24px; }

        .hamburger input:checked ~ .line:nth-child(2) {
            transform: rotate(45deg) translate(6px, 6px);
        }
        .hamburger input:checked ~ .line:nth-child(3) {
            opacity: 0;
        }
        .hamburger input:checked ~ .line:nth-child(4) {
            transform: rotate(-45deg) translate(6px, -6px);
        }
